version: '3.8'

services:
  acdyon-web:
    image: node:18-alpine
    working_dir: /app
    volumes:
      - ./out:/app
    ports:
      - "80:3000"
      - "443:3443"
    environment:
      - NODE_ENV=production
    command: npx http-server out -p 3000 -c-1
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./out:/usr/share/nginx/html:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    restart: unless-stopped
